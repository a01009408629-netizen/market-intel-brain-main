name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.21"
  RUST_VERSION: '1.85.0'

jobs:
  # ===== AUTO FIX =====
  auto-fix:
    name: Auto Fix Code Issues
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ./microservices/go-services/api-gateway/go.mod

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      # FIX 1: الـ Rust build يحتاج librdkafka-dev و libsasl2-dev
      - name: Install System Dependencies for Rust
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libsasl2-dev \
            pkg-config \
            libssl-dev \
            libpq-dev \
            protobuf-compiler \
            libclang-dev \
            clang \
            cmake \
            build-essential \
            librdkafka-dev \
            libzstd-dev

      - name: Install Go Tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Auto Fix Go Code
        working-directory: ./microservices/go-services/api-gateway
        run: |
          echo "Auto-fixing Go code..."
          go fmt ./...
          goimports -w .
          golangci-lint run --fix --timeout=10m ./...
          echo "Go code auto-fixed"

      - name: Auto Fix Rust Code
        working-directory: ./microservices/rust-services/core-engine
        run: |
          echo "Auto-fixing Rust code..."
          cargo fmt
          cargo clippy --fix --allow-dirty --allow-staged
          echo "Rust code auto-fixed"

      - name: Commit and Push Fixes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-fix code formatting and linting issues"
            git push
          fi

  # ===== PROTOBUF GENERATION =====
  generate-proto:
    name: Generate Protocol Buffers
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # FIX 2: أضفنا go setup قبل استخدام go install
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libsasl2-dev

      - name: Install Go Protobuf Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate Protocol Buffers
        run: |
          echo "Generating protocol buffers..."
          mkdir -p microservices/go-services/api-gateway/pb
          protoc --go_out=. --go-grpc_out=. --go_opt=paths=source_relative \
            microservices/proto/*.proto \
            microservices/proto/versions/v1/*.proto
          find . -name "*.pb.go" -not -path "./pb/*" -exec mv {} ./pb/ \;
          find . -name "*_grpc.pb.go" -not -path "./pb/*" -exec mv {} ./pb/ \;
          echo "Protocol buffers generated"

      - name: Upload Generated Proto Files
        uses: actions/upload-artifact@v4
        with:
          name: generated-proto
          if-no-files-found: warn
          path: microservices/go-services/api-gateway/pb/
          retention-days: 1

  # ===== BUILD AND TEST =====
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [auto-fix, generate-proto]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ./microservices/go-services/api-gateway/go.mod

      # FIX 1: نفس الـ dependencies محتاجينها هنا كمان
      - name: Install System Dependencies for Rust
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libsasl2-dev \
            pkg-config \
            libssl-dev \
            libpq-dev \
            protobuf-compiler \
            libclang-dev \
            clang \
            cmake \
            build-essential \
            librdkafka-dev \
            libzstd-dev

      - name: Install Go Tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Download Generated Proto Files
        uses: actions/download-artifact@v4
        with:
          name: generated-proto
          path: microservices/go-services/api-gateway/pb/

      - name: Validate Linting (No Fixes)
        working-directory: ./microservices/go-services/api-gateway
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          golangci-lint run --timeout=10m ./...
          echo "Linting validation passed"

      - name: Build Service
        working-directory: ./microservices/go-services/api-gateway
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go build -o bin/api-gateway ./cmd/api-gateway/main.go
          echo "Build completed successfully"

      - name: Run Tests
        working-directory: ./microservices/go-services/api-gateway
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          echo "Tests completed successfully"

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./microservices/go-services/api-gateway/coverage.out
          flags: unittests
          name: codecov-umbrella

  # ===== SECURITY SCAN =====
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [auto-fix, generate-proto]
    if: always()
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      # FIX 1: محتاج dependencies عشان cargo audit يشتغل
      - name: Install System Dependencies for Rust
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libsasl2-dev \
            pkg-config \
            libssl-dev \
            libpq-dev \
            protobuf-compiler \
            libclang-dev \
            clang \
            cmake \
            build-essential \
            librdkafka-dev \
            libzstd-dev

      - name: Install cargo-audit
        working-directory: ./microservices/rust-services/core-engine
        run: cargo install cargo-audit --locked

      - name: Ensure audit directories exist
        run: |
          mkdir -p microservices/rust-services/core-engine/target/audit
          mkdir -p microservices/rust-services/core-engine/target/ctest
          mkdir -p microservices/go-services/api-gateway/test-results
          touch microservices/rust-services/core-engine/target/audit/.gitkeep
          touch microservices/go-services/api-gateway/test-results/.gitkeep

      - name: Rust Security Audit
        working-directory: ./microservices/rust-services/core-engine
        run: |
          mkdir -p target/audit
          cargo audit --json > target/audit/audit-report.json 2>/dev/null || echo "{}" > target/audit/audit-report.json
          cargo audit

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Git Auth
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run Security Scan
        working-directory: ./microservices/go-services/api-gateway
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          mkdir -p test-results
          gosec -fmt sarif -out gosec-report.sarif ./...

      # FIX 3: الـ action الصح هو codeql-action/upload-sarif@v3 مش v4
      - name: Upload Security Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./microservices/go-services/api-gateway/gosec-report.sarif

      - name: Upload Security and Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-reports
          if-no-files-found: warn
          path: |
            microservices/rust-services/core-engine/target/audit/
            microservices/go-services/api-gateway/gosec-report.sarif
            microservices/rust-services/core-engine/target/ctest/
            microservices/go-services/api-gateway/test-results/

  # ===== DEPLOY =====
  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: [build-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.build-test.result == 'success'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pre-flight Check
        run: |
          echo "=== Checking file structure ==="
          find . -name "Dockerfile"
          find . -name "Cargo.toml"
          find . -name "go.sum"
          echo "=== Docker version ==="
          docker --version
          echo "=== Proto files ==="
          find . -name "*.proto"
          echo "=== Directory structure ==="
          ls -la microservices/
          ls -la microservices/rust-services/core-engine/
          ls -la microservices/go-services/api-gateway/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./microservices/go-services/api-gateway
          push: true
          tags: |
            ghcr.io/a01009408629/api-gateway:latest
            ghcr.io/a01009408629/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Rust Services
        uses: docker/build-push-action@v5
        with:
          context: ./microservices/rust-services/core-engine
          file: ./microservices/rust-services/core-engine/Dockerfile
          push: true
          tags: |
            ghcr.io/a01009408629/core-engine-service:latest
            ghcr.io/a01009408629/core-engine-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max